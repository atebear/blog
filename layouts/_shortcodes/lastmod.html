{{- $lastmod := .Page.Lastmod -}}
{{- if not $lastmod -}}
  {{- $lastmod = .Page.PublishDate -}}
{{- end -}}

{{- if $lastmod -}}
  <span id="lastmod-text">Loading...</span>
  <script>
    (function() {
      // Hugo injects the exact timestamp here
      const timestamp = "{{ $lastmod.Format "2006-01-02T15:04:05Z07:00" }}"; 
      const lastMod = new Date(timestamp).getTime();
      const now = new Date().getTime();
      const diff = now - lastMod;

      let text = "";

      if (diff < 0) {
        text = "Last edited: Just now";
      } else if (diff < 60000) {
        const seconds = Math.floor(diff / 1000);
        text = `Last edited: ${seconds} second${seconds !== 1 ? 's' : ''} ago`;
      } else if (diff < 3600000) {
        const minutes = Math.floor(diff / 60000);
        text = `Last edited: ${minutes} minute${minutes !== 1 ? 's' : ''} ago`;
      } else if (diff < 86400000) {
        const hours = Math.floor(diff / 3600000);
        text = `Last edited: ${hours} hour${hours !== 1 ? 's' : ''} ago`;
      } else {
        const days = Math.floor(diff / 86400000);
        text = `Last edited: ${days} day${days !== 1 ? 's' : ''} ago`;
      }

      document.getElementById("lastmod-text").textContent = text;
    })();
  </script>
{{- else -}}
  <span>No modification date available.</span>
{{- end -}}
